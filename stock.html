<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>증권 소식</title>
<style>
:root{--bg:#f5f7fa;--card:#fff;--text:#1a1a1a;--muted:#6b7280;--accent:#16a34a;--border:#e5e7eb}
*{box-sizing:border-box}
body{margin:0;font-family:'맑은 고딕','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}
header{background:linear-gradient(135deg,#84cc16,#22c55e);color:#fff;padding:22px 20px;text-align:center}
header h1{margin:0;font-size:1.4rem}
header p{margin:4px 0 0;opacity:.92;font-size:.85rem}
.container{max-width:1100px;margin:0 auto;padding:18px 14px}
.back-button{display:inline-block;margin-bottom:10px;padding:7px 11px;background:#fff;border:1px solid var(--border);border-radius:8px;color:var(--accent);text-decoration:none;font-size:.86rem}
.section-title{font-size:1.05rem;margin:18px 0 10px;padding-left:10px;border-left:4px solid var(--accent);background:#fff;padding-top:6px;padding-bottom:6px;border-radius:0 6px 6px 0}
.price-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.price-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.price-label{font-size:.82rem;color:var(--muted);margin-bottom:4px}
.price-value{font-size:1.1rem;font-weight:700;color:#0f766e}
.price-change{font-size:.76rem;margin-top:4px}
.up{color:#dc2626}.down{color:#2563eb}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.news-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;transition:transform .08s ease,box-shadow .15s ease}
.news-item:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.06)}
.news-title{display:block;font-size:.95rem;font-weight:600;color:var(--text);text-decoration:none;line-height:1.42}
.news-title:hover{color:var(--accent);text-decoration:underline}
.news-meta{margin-top:6px;font-size:.76rem;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>📈 증권 소식</h1>
  <p>주요 시세 + 세부 기사 | 최종 생성: 07-24 07:01</p>
</header>
<div class="container">
  <a class="back-button" href="index.html">← 메인으로 돌아가기</a>

  <div class="section-title">📊 주요 시세</div>
  <div class="price-grid">
    
        <div class="price-card">
          <div class="price-label">코스피</div>
          <div class="price-value">6,690.62</div>
          <div class="price-change">-</div>
        </div>

        <div class="price-card">
          <div class="price-label">코스닥</div>
          <div class="price-value">748.22</div>
          <div class="price-change">-</div>
        </div>

        <div class="price-card">
          <div class="price-label">1.SK하이닉스</div>
          <div class="price-value">1,759,000</div>
          <div class="price-change">하락160,000</div>
        </div>

        <div class="price-card">
          <div class="price-label">2.삼성전자</div>
          <div class="price-value">249,500</div>
          <div class="price-change">하락20,500</div>
        </div>

        <div class="price-card">
          <div class="price-label">3.코오롱티슈진</div>
          <div class="price-value">15,000</div>
          <div class="price-change">하락6,050</div>
        </div>

        <div class="price-card">
          <div class="price-label">4.NAVER</div>
          <div class="price-value">207,500</div>
          <div class="price-change">하락12,500</div>
        </div>

        <div class="price-card">
          <div class="price-label">5.현대차</div>
          <div class="price-value">401,000</div>
          <div class="price-change">하락31,000</div>
        </div>

        <div class="price-card">
          <div class="price-label">LG에너지솔루션</div>
          <div class="price-value">-</div>
          <div class="price-change">-</div>
        </div>

        <div class="price-card">
          <div class="price-label">삼성SDI</div>
          <div class="price-value">-</div>
          <div class="price-change">-</div>
        </div>
  </div>

  <div class="section-title">📰 세부 기사</div>
  <div class="cards-grid">
    <div class="news-item"><div class="news-title">표시할 뉴스가 없습니다.</div></div>
  </div>
</div>
</body>
</html>
