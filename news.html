<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 주요 뉴스</title>
<style>
:root{--bg:#f5f7fa;--card:#fff;--text:#1a1a1a;--muted:#6b7280;--accent:#2563eb;--border:#e5e7eb}
*{box-sizing:border-box}
body{margin:0;font-family:'맑은 고딕','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}
header{background:linear-gradient(135deg,var(--accent),#0ea5e9);color:#fff;padding:22px 20px;text-align:center}
header h1{margin:0;font-size:1.3rem}
header p{margin:4px 0 0;opacity:.92;font-size:.85rem}
.container{max-width:1100px;margin:0 auto;padding:18px 14px}
.back-button{display:inline-block;margin-bottom:10px;padding:7px 11px;background:#fff;border:1px solid var(--border);border-radius:8px;color:var(--accent);text-decoration:none;font-size:.86rem}
.weather{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid #fcd34d;border-radius:12px;padding:16px 18px;margin-bottom:20px;color:#78350f}
.weather h2{margin:0 0 6px;font-size:1.05rem}
.category-section{margin-bottom:22px}
.category-section h2{font-size:1.1rem;margin:0 0 10px;padding-left:10px;border-left:4px solid var(--accent);background:#fff;padding-top:6px;padding-bottom:6px;border-radius:0 6px 6px 0}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.news-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;transition:transform .08s ease,box-shadow .15s ease}
.news-item:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.06)}
.news-title{display:block;font-size:.95rem;font-weight:600;color:var(--text);text-decoration:none;line-height:1.42}
.news-title:hover{color:var(--accent);text-decoration:underline}
.news-meta{margin-top:8px;font-size:.76rem;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>📰 오늘의 주요 뉴스</h1>
  <p>기준일: 2026-07-18 | 최종 생성: 2026-07-19 07:00</p>
</header>
<div class="container">
  <a class="back-button" href="index.html">← 메인으로 돌아가기</a>
  <div class="weather">
    <h2>🌤 춘천 날씨</h2>
    
          <p><strong>현재 춘천:</strong> 대체로 맑음 / 22.1°C</p>
          <p><strong>습도:</strong> 94% / <strong>바람:</strong> 4.1 km/h</p>
          <small>출처: Open-Meteo | 최종 업데이트: 2026-07-19 07:00</small>
        
  </div>
  
</div>
</body>
</html>
